[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=packages/shared/prisma/schema.prisma && npm run build -w packages/shared && npm run build -w apps/api"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
